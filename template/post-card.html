<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SkySystems USA -- Post Card</title>
<!--
  Reusable, on-brand post graphic for SkySystems USA.

  HOW TO USE
  1. Edit the two values in the <script> at the bottom (HEADLINE, SUBTEXT),
     OR pass them in the URL:
       post-card.html?headline=Your%20Headline&subtext=Your%20subtext
  2. Open this file in a browser.
  3. Screenshot the card (it is exactly 1200x630, Facebook's share size),
     or use a headless renderer. The .card element is the crop boundary.

  No build step and no JS framework -- just one Google Fonts link.
  Palette: near-black navy background, bright green accent, white body text.
  Fonts: Rajdhani (headings), Nunito Sans (body).
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito+Sans:wght@400;600;700&display=swap"
  rel="stylesheet"
/>
<style>
  :root {
    --bg-top: #0a1a2f;
    --bg-bottom: #0a0e14;
    --green: #22c55e;
    --green-soft: #2ecc71;
    --white: #f5f8fc;
    --muted: #9fb3c8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #05080d;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: "Nunito Sans", system-ui, sans-serif;
  }

  .card {
    position: relative;
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background:
      radial-gradient(120% 120% at 80% -10%, rgba(34, 197, 94, 0.16), transparent 55%),
      linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 70%);
    color: var(--white);
  }

  /* Subtle tech grid texture, understated. */
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(34, 197, 94, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34, 197, 94, 0.06) 1px, transparent 1px);
    background-size: 48px 48px;
    -webkit-mask-image: radial-gradient(120% 90% at 70% 20%, #000 30%, transparent 75%);
            mask-image: radial-gradient(120% 90% at 70% 20%, #000 30%, transparent 75%);
    opacity: 0.9;
    pointer-events: none;
  }

  /* Faint green glow accent arc in the corner. */
  .card::after {
    content: "";
    position: absolute;
    right: -180px;
    top: -180px;
    width: 520px;
    height: 520px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(46, 204, 113, 0.22), transparent 60%);
    filter: blur(8px);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 90px 80px 0 80px;
  }

  .kicker {
    font-family: "Rajdhani", sans-serif;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-size: 22px;
    color: var(--green);
    margin-bottom: 26px;
  }

  .kicker .bar {
    display: inline-block;
    width: 46px;
    height: 4px;
    background: var(--green);
    vertical-align: middle;
    margin-right: 16px;
    border-radius: 2px;
  }

  .headline {
    font-family: "Rajdhani", sans-serif;
    font-weight: 700;
    font-size: 76px;
    line-height: 1.04;
    letter-spacing: 0.005em;
    max-width: 940px;
    text-wrap: balance;
  }

  /* Wrap any word in <span class="hl"> to highlight it green. */
  .headline .hl { color: var(--green-soft); }

  .subtext {
    margin-top: 30px;
    font-size: 28px;
    line-height: 1.5;
    color: var(--muted);
    max-width: 820px;
    font-weight: 400;
  }

  /* Footer: wordmark bottom-left, domain bottom-right. */
  .footer {
    position: absolute;
    left: 80px;
    right: 80px;
    bottom: 56px;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .wordmark {
    font-family: "Rajdhani", sans-serif;
    font-weight: 700;
    font-size: 34px;
    letter-spacing: 0.01em;
  }
  .wordmark .sky { color: var(--white); }
  .wordmark .systems { color: var(--green); }

  .domain {
    font-family: "Rajdhani", sans-serif;
    font-weight: 600;
    font-size: 26px;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="content">
      <div class="kicker"><span class="bar"></span><span id="kicker">Austin, Texas</span></div>
      <h1 class="headline" id="headline"></h1>
      <p class="subtext" id="subtext"></p>
    </div>
    <div class="footer">
      <div class="wordmark"><span class="sky">Sky</span><span class="systems">Systems</span></div>
      <div class="domain">skyusa.us</div>
    </div>
  </div>

  <script>
    // Defaults -- edit these, or override via ?headline=...&subtext=...&kicker=...
    var HEADLINE = "Enterprise Security for <span class='hl'>Small Business</span>. On Purpose.";
    var SUBTEXT = "Managed IT and cybersecurity for Austin businesses, backed by 24/7 follow-the-sun support.";
    var KICKER = "Austin, Texas";

    var params = new URLSearchParams(window.location.search);
    if (params.get("headline")) HEADLINE = params.get("headline");
    if (params.get("subtext")) SUBTEXT = params.get("subtext");
    if (params.get("kicker")) KICKER = params.get("kicker");

    // headline allows the <span class="hl"> highlight markup; subtext is plain.
    document.getElementById("headline").innerHTML = HEADLINE;
    document.getElementById("subtext").textContent = SUBTEXT;
    document.getElementById("kicker").textContent = KICKER;
  </script>
</body>
</html>
